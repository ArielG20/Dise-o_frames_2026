<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: aquamarine;
            color: #1e293b;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
        }
        h2 {
            color: #1e3a8a;
            margin-bottom: 15px;
        }
        .imagen-contenedor {
            max-width: 500px;
            max-height: 500px;
            border: 4px dashed #cbd5e1; /* Cuadro guía para imagen */
            padding: 10px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <h2>Bienvenido</h2>
    
    <div class="imagen-contenedor">
        <img src="../imagenes/carita8.png" alt="Imagen perzonalizada Carita">
    </div>

</body>
</html>
